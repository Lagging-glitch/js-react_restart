<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala</title>
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon" />
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- fonts integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <!-- nav-bar -->
      <div class="navbar bg-slate-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href=""><i class="fas fa-question-circle"></i>FAQ</a>
              </li>
              <li>
                <a href=""><i class="fa-solid fa-book-open"></i>Learn</a>
              </li>
              <li>
                <a href=""
                  ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
                >
              </li>
            </ul>
          </div>
          <a href="" class="btn btn-ghost">
            <span class="text-xl font-bold">English</span>
            <img src="/assets/logo.png" alt="" />
            <span class="font-bangla text-xl">জানালা</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-3">
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fas fa-question-circle"></i>FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-book-open"></i>Learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <!-- hero -->
    <section
      class="flex flex-col-reverse md:flex-row gap-10 items-center py-5 px-4 w-11/12 mx-auto"
    >
      <div class="content flex-1 flex flex-col gap-4">
        <h2 class="text-4xl font-extrabold">
          <span class="text-sky-400">English</span> is Easy!!
        </h2>
        <p class="font-bangla text-lg mt-4">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ!
        </p>
        <input type="text" class="input" placeholder="Enter Your Name" />
        <input type="password" class="input" placeholder=".................." />
        <button class="btn btn-primary w-3/8">Get Started</button>
      </div>
      <div class="img flex-1">
        <img src="/assets/hero-student.png" alt="" class="w-full" />
      </div>
    </section>
    <!-- lesson-btns -->
    <section>
      <h2 class="text-4xl font-extrabold text-center mt-20">
        <span class="text-sky-400">Let's</span> Learn Vocabularies!
      </h2>
      <div
        id="lesson-container"
        class="flex gap-5 justify-center flex-wrap py-6"
      ></div>
    </section>

    <!-- word-container -->
    <section id="word-container" class="bg-white w-11/12 mx-auto grid grid-cols-3 gap-5">

    </section>

    <script src="script.js"></script>
  </body>
</html>
